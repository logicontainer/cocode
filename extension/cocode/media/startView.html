<!DOCTYPE html>
<html lang="en">
<head>
<style>
    body {
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 6px;
    }
    button {
        background: var(--vscode-button-background);
        color: var(--vscode-button-foreground);
        border: none;
        padding: 6px;
        border-radius: 4px;
        cursor: pointer;
        width: 100%;
    }
    button:hover {
        background: var(--vscode-button-hoverBackground);
    }
    #session-code-value {
        font-weight: bold;
    }
</style>
</head>
<body>
    <p>
        Start a new live coding session to post questions, 
        and receive answers. Students can write answers 
        <a href="https://cocode.kasperskov.dev">here</a>!
    </p>
    <button id="start-session-btn">Create Session</button>
    <div id="session-code" style="display: none;">
        <p id="session-code-text">Found existing session with code: 
            <span id="session-code-value"></span>
        </p>
        <button id="rejoin-session-btn">Rejoin Session</button>
    </div>
<script>
    const vscode = acquireVsCodeApi();
    // Listen for label updates from the extension
    window.addEventListener('message', (event) => {
        const { command, text } = event.data;
        if (command === 'setSessionCode') {
            document.getElementById('session-code').style.display = 'block';
            document.getElementById('session-code-value').textContent = text;
        }
    });

    document.getElementById('start-session-btn')
            .addEventListener('click', () => {
        vscode.postMessage({ command: 'StartSession' });
    });

    document.getElementById('rejoin-session-btn')
            .addEventListener('click', () => {
        vscode.postMessage({ command: 'RejoinSession' });
    });
</script>
</body>
</html>
